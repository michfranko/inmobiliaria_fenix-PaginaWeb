<div class="login-page-container">
  <div class="login-card">
    <div class="login-header">
      <img src="assets/imagenes/logoFenix5.png" alt="Inmobiliaria Fenix" class="login-logo" (click)="goBack()">
      <h1>Acceso Corporativo</h1>
      <p>Gestione sus propiedades con eficiencia</p>
    </div>

    <form (ngSubmit)="onLogin()" class="login-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="email" 
            placeholder="ejemplo@fenix.com" 
            required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="password" 
            placeholder="••••••••" 
            required>
        </div>
      </div>

      <div *ngIf="error" class="error-msg">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>

      <button type="submit" class="login-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>

      <div class="login-footer">
        <a routerLink="/home" class="back-link">
          <i class="fas fa-arrow-left"></i> Volver al sitio principal
        </a>
      </div>
    </form>
  </div>
</div>
